schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  .NET 10 (C#), DDD + CQRS, PostgreSQL, JWT, Serilog.
  5 projects: SharedKernel, Domain, Application, Infrastructure, Web.Api.
  Explicit typing, file-scoped namespaces, internal sealed types.
  ALL development MUST happen inside the devcontainer (.devcontainer/).
  Never install SDKs or tools on the host. Start infra with docker compose up -d.

