services:
  # ── PostgreSQL (single instance, 3 databases) ──
  postgres:
    image: postgres:17
    container_name: sandbox-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - sandbox-postgres-data:/var/lib/postgresql/data
      - ./docker/migrations/000-init.sh:/docker-entrypoint-initdb.d/000-init.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Migrations (ephemeral — runs once and dies) ──
  migrations:
    image: postgres:17
    container_name: sandbox-migrations
    environment:
      PGPASSWORD: migration_pass
    volumes:
      - ./docker/migrations/run-migrations.sh:/run-migrations.sh:ro
      - ./docker/migrations:/migrations:ro
    entrypoint: ["bash", "/run-migrations.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  # ── RabbitMQ ──
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sandbox-rabbitmq
    user: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "expense-tracker-cookie"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Seq (structured logs) ──
  seq:
    image: datalust/seq:2024.3
    container_name: sandbox-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "8082:80"

  # ── pgAdmin ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sandbox-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Auth API ──
  auth-api:
    build:
      context: .
      dockerfile: src/Auth/Auth.Api/Dockerfile
    container_name: sandbox-auth-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5100
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=auth-db;Username=auth_app;Password=auth_app_pass
      Jwt__PrivateKeyPath: /app/keys/auth-private.pem
      Jwt__PublicKeyPath: /app/keys/auth-public.pem
      Jwt__Issuer: auth-service
      Jwt__Audience: expense-tracker
      Jwt__ExpirationInMinutes: "60"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
      Serilog__MinimumLevel__Default: Information
      Serilog__WriteTo__0__Name: Console
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__ServerUrl: http://seq:5341
    ports:
      - "5100:5100"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  # ── Permission API ──
  permission-api:
    build:
      context: .
      dockerfile: src/Permission/Permission.Api/Dockerfile
    container_name: sandbox-permission-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5200
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=permission-db;Username=perm_app;Password=perm_app_pass
      Jwt__Issuer: auth-service
      Jwt__Audience: expense-tracker
      Jwt__JwksUrl: http://auth-api:5100/.well-known/jwks
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
      Serilog__MinimumLevel__Default: Information
      Serilog__WriteTo__0__Name: Console
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__ServerUrl: http://seq:5341
    ports:
      - "5200:5200"
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      auth-api:
        condition: service_started

  # ── Expense API ──
  expense-api:
    build:
      context: .
      dockerfile: src/Expense/Expense.Api/Dockerfile
    container_name: sandbox-expense-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=expense-db;Username=expense_app;Password=expense_app_pass
      Jwt__Issuer: auth-service
      Jwt__Audience: expense-tracker
      Jwt__JwksUrl: http://auth-api:5100/.well-known/jwks
      PermissionService__BaseUrl: http://permission-api:5200
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
      Serilog__MinimumLevel__Default: Information
      Serilog__WriteTo__0__Name: Console
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__ServerUrl: http://seq:5341
    ports:
      - "5000:5000"
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      auth-api:
        condition: service_started
      permission-api:
        condition: service_started

volumes:
  sandbox-postgres-data:
  pgadmin-data:
