services:
  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense-tracker"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web-api:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - 8080:8080
      - 8081:8081
    volumes:
      - ~/.microsoft/usersecrets:/root/.microsoft/usersecrets:ro
    extra_hosts:
      - host.docker.internal:host-gateway